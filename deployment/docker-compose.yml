services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    # Memory tuning values are computed for the default POSTGRES_MEMORY_LIMIT=1G (1024 MB):
    #   shared_buffers     = 20% of 1024 MB = 204 MB
    #   maintenance_work_mem = 5% of 1024 MB = 51 MB
    #   effective_cache_size = 50% of 1024 MB = 512 MB
    #   work_mem           = 25% of 1024 MB / 100 connections = 2 MB
    # To adjust for a different memory limit, change the -c flags proportionally.
    command: >-
      postgres
      -c max_connections=100
      -c shared_buffers=204MB
      -c work_mem=2MB
      -c maintenance_work_mem=51MB
      -c effective_cache_size=512MB
      -c max_wal_size=1GB
      -c min_wal_size=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?error}
      POSTGRES_USER: ${POSTGRES_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    shm_size: 256m
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ponder:
    image: ${PROJECT_PREFIX:?error}-ponder:${APP_REVISION:?error}
    restart: unless-stopped
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PIPELINE_BUILD_TAG: ${APP_REVISION}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:?error}
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:?error}
      GNOSIS_RPC_URL: ${GNOSIS_RPC_URL:?error}
      DISABLE_POLL_RESULT_CHECK: ${DISABLE_POLL_RESULT_CHECK:-false}
      DISABLE_SETTLEMENT_FACTORY_CHECK: ${DISABLE_SETTLEMENT_FACTORY_CHECK:-false}
    ports:
      - "${PONDER_EXPOSED_PORT:-40000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres-data:
    name: ${PROJECT_PREFIX:?error}-postgres-data
